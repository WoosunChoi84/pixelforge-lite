name: Publish to PyPI

# Triggered when a version tag is pushed (e.g., v0.1.0, v1.2.3).
# Uses PyPI Trusted Publisher (OIDC) — no API token needed once the project
# is registered at:
#   https://pypi.org/manage/account/publishing/
# with these exact values:
#   Project name: pixelforge-lite
#   Owner: WoosunChoi84
#   Repository name: pixelforge-lite
#   Workflow name: publish.yml
#   Environment name: pypi
#
# If Trusted Publisher is not yet registered, the final step will fail with
# an OIDC auth error. Either (1) register and re-run, or (2) fall back to
# API-token mode by replacing `pypa/gh-action-pypi-publish` configuration.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # pyproject setuptools may read tags

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist + wheel
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: distributions
          path: dist/
          retention-days: 7

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/p/pixelforge-lite
    permissions:
      # Required for OIDC Trusted Publishing
      id-token: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: distributions
          path: dist/

      - name: Publish to PyPI (Trusted Publisher OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Omitting `password` triggers OIDC Trusted Publishing
          verbose: true
          print-hash: true
